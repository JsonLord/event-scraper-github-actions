name: Weekly Multi-Source Scraper with Jules Analysis

on:
  schedule:
    # Run every Sunday at 5 PM UTC
    - cron: '0 17 * * 0'
  workflow_dispatch:
    inputs:
      urls:
        description: 'Comma-separated URLs to scrape (optional)'
        required: false
        default: ''

jobs:
  # Step 1: Initial scrape with CloakBrowser (all sources in parallel)
  initial-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        url_data: ${{ fromJson(inputs.urls != '' && format('["${{ github.event.inputs.urls }}"]') || '["https://rausgegangen.de/en/berlin/tipps-fuer-heute/","https://www.eventbrite.de/d/germany/berlin/events/","https://www.meetup.com/berlin/events/"]') }}
      fail-fast: false
    env:
      TARGET_URL: ${{ matrix.url_data }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cloakbrowser python-dotenv beautifulsoup4 lxml

      - name: Configure environment
        run: |
          echo "JULES_API_KEY=${{ secrets.JULES_API_KEY }}" >> $GITHUB_ENV
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Extract site name
        id: site-info
        run: |
          URL="${TARGET_URL}"
          SITE_NAME=$(echo "$URL" | sed -E 's|https?://(www\.)?||' | sed -E 's|/.*||' | sed 's/\./_/g')
          echo "site_name=$SITE_NAME" >> $GITHUB_OUTPUT
          echo "site_url=$URL" >> $GITHUB_OUTPUT

      - name: Scrape with CloakBrowser (raw HTML)
        run: |
          echo "Scraping ${{ steps.site-info.outputs.site_name }} with CloakBrowser..."
          
          python scripts/jules_cloak_scraper.py \
            --url "${{ steps.site-info.outputs.site_url }}" \
            --site-name "${{ steps.site-info.outputs.site_name }}" \
            --output "data/raw_${{ steps.site-info.outputs.site_name }}.json" \
            --price-max 9999 \
            --date-days 365 \
            --save-html \
            --raw-mode
          
          # Save HTML for Jules analysis
          if [ -f "data/site.html" ]; then
            mkdir -p data/html
            mv data/site.html "data/html/${{ steps.site-info.outputs.site_name }}.html"
          fi

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        with:
          name: raw-${{ steps.site-info.outputs.site_name }}
          path: |
            data/raw_${{ steps.site-info.outputs.site_name }}.json
            data/html/${{ steps.site-info.outputs.site_name }}.html
          retention-days: 7

  # Step 2: Jules analyzes completeness and finds missed events
  jules-analysis:
    needs: initial-scrape
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        source: ${{ fromJSON('["rausgegangen", "eventbrite", "meetup"]') }}  # Match your actual sources
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Configure environment
        run: |
          echo "JULES_API_KEY=${{ secrets.JULES_API_KEY }}" >> $GITHUB_ENV

      - name: Download raw results
        uses: actions/download-artifact@v4
        with:
          name: raw-${{ matrix.source }}
          path: data/

      - name: Jules completeness analysis
        id: analysis
        run: |
          echo "Running Jules analysis for ${{ matrix.source }}..."
          
          python scripts/jules_analysis.py \
            --source "${{ matrix.source }}" \
            --raw-events "data/raw_${{ matrix.source }}.json" \
            --html "data/html/${{ matrix.source }}.html" \
            --output "data/analysis_${{ matrix.source }}.json"
          
          # Extract findings
          MISSED_COUNT=$(python -c "import json; d=json.load(open('data/analysis_${{ matrix.source }}.json')); print(d.get('missed_count', 0))" 2>/dev/null || echo "0")
          NEEDS_UPDATE=$(python -c "import json; d=json.load(open('data/analysis_${{ matrix.source }}.json')); print('true' if d.get('needs_update', False) else 'false')" 2>/dev/null || echo "false")
          
          echo "missed_count=$MISSED_COUNT" >> $GITHUB_OUTPUT
          echo "needs_update=$NEEDS_UPDATE" >> $GITHUB_OUTPUT

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: analysis-${{ matrix.source }}
          path: data/analysis_${{ matrix.source }}.json
          retention-days: 7

  # Step 3: Jules updates scraper scripts based on analysis
  update-scrapers:
    needs: jules-analysis
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        source: ${{ fromJSON('["rausgegangen", "eventbrite", "meetup"]') }}
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Configure environment
        run: |
          echo "JULES_API_KEY=${{ secrets.JULES_API_KEY }}" >> $GITHUB_ENV
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Download analysis
        uses: actions/download-artifact@v4
        with:
          name: analysis-${{ matrix.source }}
          path: data/

      - name: Check if update needed
        id: check
        run: |
          NEEDS_UPDATE=$(python -c "import json; d=json.load(open('data/analysis_${{ matrix.source }}.json')); print('true' if d.get('needs_update', False) else 'false')" 2>/dev/null || echo "false")
          echo "needs_update=$NEEDS_UPDATE" >> $GITHUB_OUTPUT

      - name: Generate improved scraper with Jules
        if: steps.check.outputs.needs_update == 'true'
        run: |
          echo "Generating improved scraper for ${{ matrix.source }} with Jules..."
          
          python scripts/jules_scraper_generator.py \
            --source "${{ matrix.source }}" \
            --analysis "data/analysis_${{ matrix.source }}.json" \
            --output "scripts/improved_${{ matrix.source }}_scraper.py"
          
          # Replace old scraper with improved version
          cp "scripts/improved_${{ matrix.source }}_scraper.py" "scripts/${{ matrix.source }}_scraper.py"

      - name: Commit scraper improvements
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          git add "scripts/${{ matrix.source }}_scraper.py"
          git diff --staged --quiet || git commit -m "Improve ${{ matrix.source }} scraper based on Jules analysis [skip ci]"
          git push

  # Step 4: Re-scrape with improved scripts
  re-scrape:
    needs: [initial-scrape, update-scrapers]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        source: ${{ fromJSON('["rausgegangen", "eventbrite", "meetup"]') }}
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cloakbrowser python-dotenv

      - name: Configure environment
        run: |
          echo "JULES_API_KEY=${{ secrets.JULES_API_KEY }}" >> $GITHUB_ENV
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Re-scrape with improved script
        run: |
          echo "Re-scraping ${{ matrix.source }} with improved script..."
          
          # Use the improved scraper (now in place)
          python scripts/jules_cloak_scraper.py \
            --url "https://${{ matrix.source }}.com/events" \
            --site-name "${{ matrix.source }}" \
            --output "data/final_${{ matrix.source }}.json" \
            --price-max 15 \
            --date-days 14

      - name: Upload final results
        uses: actions/upload-artifact@v4
        with:
          name: final-${{ matrix.source }}
          path: data/final_${{ matrix.source }}.json
          retention-days: 30

  # Step 5: Aggregate, filter, and deploy
  aggregate-and-deploy:
    needs: re-scrape
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all final results
        uses: actions/download-artifact@v4
        with:
          pattern: final-*
          path: data/
          merge-multiple: true

      - name: Aggregate and filter events
        run: |
          echo "Aggregating and filtering events..."
          
          python << 'EOF'
import json
import glob
from datetime import datetime, timedelta

# Filter: price ≤ 15€, date within 14 days
max_price = 15
cutoff_date = datetime.now() + timedelta(days=14)

all_events = {
    "scraped_at": datetime.now().isoformat(),
    "sources": {},
    "total_events": 0,
    "events": []
}

for filepath in glob.glob("data/final_*.json"):
    with open(filepath) as f:
        data = json.load(f)
        source = filepath.replace("data/final_", "").replace(".json", "")
        
        # Filter events
        filtered = []
        for event in data.get("events", []):
            price = event.get("price", 0) or 0
            event_date = event.get("date")
            
            # Apply filters
            if price > max_price:
                continue
            
            # Add to filtered list
            filtered.append(event)
        
        all_events["sources"][source] = {
            "event_count": len(filtered),
            "scraped_at": data.get("scraped_at", "")
        }
        all_events["total_events"] += len(filtered)
        all_events["events"].extend(filtered)

# Save aggregated events
with open("docs/events.json", "w") as f:
    json.dump(all_events, f, indent=2)

print(f"Total filtered events: {all_events['total_events']}")
for source, info in all_events["sources"].items():
    print(f"  {source}: {info['event_count']} events")
EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true

      - name: Summary
        run: |
          echo "## Weekly Event Scraper Summary" > summary.md
          echo "" >> summary.md
          echo "Scraped at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> summary.md
          echo "" >> summary.md
          echo "Events by source:" >> summary.md
          
          python << 'EOF'
import json
with open("docs/events.json") as f:
    data = json.load(f)
    for source, info in data["sources"].items():
        print(f"- {source}: {info['event_count']} events") >> summary.md
EOF

          cat summary.md
