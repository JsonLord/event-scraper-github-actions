name: Weekly Event Scraper with Autonomous Repair

permissions:
  contents: write

on:
  schedule:
    # Run every Sunday at 5 PM UTC
    - cron: '0 17 * * 0'
  workflow_dispatch:
    inputs:
      urls:
        description: 'Comma-separated URLs to scrape (optional)'
        required: false
        default: 'https://rausgegangen.de/en/berlin/tipps-fuer-heute/,https://www.eventbrite.de/d/germany/berlin/events/,https://www.meetup.com/berlin/events/'

jobs:
  autonomous-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      matrix:
        url_data: ["https://rausgegangen.de/en/berlin/tipps-fuer-heute/", "https://www.eventbrite.de/d/germany/berlin/events/", "https://www.meetup.com/berlin/events/"]
      fail-fast: false
    env:
      TARGET_URL: ${{ matrix.url_data }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cloakbrowser python-dotenv pyyaml requests beautifulsoup4 lxml

      - name: Install CloakBrowser Binary
        run: python -m cloakbrowser install

      - name: Configure environment
        run: |
          echo "JULES_API_KEY=${{ secrets.JULES_API_KEY }}" >> $GITHUB_ENV
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Extract site info
        id: site-info
        run: |
          URL="${TARGET_URL}"
          SITE_NAME=$(echo "$URL" | sed -E 's|https?://(www\.)?||' | sed -E 's|/.*||' | sed 's/\./_/g')
          echo "site_name=$SITE_NAME" >> $GITHUB_OUTPUT
          
          # Determine which script to use
          if [[ "$URL" == *"rausgegangen"* ]]; then
            echo "script=scripts/rausgegangen_scraper.py" >> $GITHUB_OUTPUT
          elif [[ "$URL" == *"eventbrite"* ]]; then
            echo "script=scripts/eventbrite_scraper.py" >> $GITHUB_OUTPUT
          elif [[ "$URL" == *"meetup"* ]]; then
            echo "script=scripts/meetup_scraper.py" >> $GITHUB_OUTPUT
          else
            echo "script=scripts/jules_cloak_scraper.py" >> $GITHUB_OUTPUT
          fi

      - name: Run Autonomous Repair Scrape
        run: |
          python scripts/autonomous_repair.py \
            --script "${{ steps.site-info.outputs.script }}" \
            --url "${TARGET_URL}" \
            --site-name "${{ steps.site-info.outputs.site_name }}" \
            --retries 3

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: scrape-${{ steps.site-info.outputs.site_name }}
          path: |
            data/raw_${{ steps.site-info.outputs.site_name }}.json
            data/html/${{ steps.site-info.outputs.site_name }}.html
          retention-days: 7

  aggregate-and-deploy:
    needs: autonomous-scrape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: scrape-*
          path: data/
          merge-multiple: true

      - name: Aggregate events
        run: |
          python -c "
          import json, glob, os
          all_events = []
          for f in glob.glob('data/raw_*.json'):
              with open(f) as j:
                  all_events.extend(json.load(j).get('events', []))
          os.makedirs('docs', exist_ok=True)
          with open('docs/events.json', 'w') as out:
              json.dump({'events': all_events, 'count': len(all_events)}, out)
          "

      - name: Commit improvements (if any)
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add scripts/*.py
          git diff --staged --quiet || git commit -m "Auto-repair: updated scraper scripts"
          git push || echo "No changes to push or push failed"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
