name: Event Validation

on:
  schedule:
    - cron: '0 17 * * *'  # Daily at 5 PM UTC (same as original cron)
  workflow_dispatch:  # Allow manual triggers

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run validation with desk_agent_2.0
      env:
        # Configuration for desk_agent_2.0
        # In a real implementation, you would set the actual endpoint here
        # For now, we'll modify the script to handle missing service gracefully
        DESK_AGENT_HOST: "localhost"
        DESK_AGENT_PORT: "7860"
        DESK_AGENT_ENABLED: "false"  # Set to true when service is available
      run: |
        echo "Running event validation..."
        python scripts/firecrawl_validation.py
        
    - name: Save validation results
      if: success()
      run: |
        echo "Saving validation results..."
        mkdir -p validation-results
        
        # Copy validation reports if they exist
        if [ -d ".hermes/event-scraper/" ]; then
          cp .hermes/event-scraper/firecrawl_validation_*.md validation-results/ 2>/dev/null || true
          cp .hermes/event-scraper/weekly-report.md validation-results/ 2>/dev/null || true
        fi
        
    - name: Upload validation artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: validation-results
        path: validation-results/
        
    - name: Update GitHub Pages with validation summary
      if: success()
      run: |
        echo "Updating GitHub Pages with validation summary..."
        mkdir -p docs/validation
        
        # Create a simple validation summary
        cat > docs/validation/summary.md << EOF
# Validation Summary
Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

## Status
- Validation job completed successfully
- Desk agent 2.0 integration: \`$(echo $DESK_AGENT_ENABLED)\`
- Check artifacts for detailed reports

## Next Validation
Scheduled to run daily at 5:00 PM UTC
EOF